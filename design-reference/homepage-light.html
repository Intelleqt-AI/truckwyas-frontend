<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruckWys Agentic Dashboard - Light Mode</title>
<style>
:root {
  --bg-deep: #F3F4F6;
  --bg-surface: #FFFFFF;
  --bg-surface-hover: #F9FAFB;
  --bg-sidebar: #FFFFFF;
  --border-subtle: #E5E7EB;
  --border-active: #D1D5DB;
  --accent-primary: #2563EB;
  --accent-bright: #3B82F6;
  --accent-dim: #EFF6FF;
  --accent-glow: rgba(37, 99, 235, 0.15);
  --text-primary: #111827;
  --text-secondary: #6B7280;
  --text-tertiary: #9CA3AF;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: var(--bg-deep); color: var(--text-primary); font-family: var(--font-sans); font-size: 14px; line-height: 1.5; height: 100vh; overflow: hidden; letter-spacing: -0.01em; }
.ambient-glow { position: fixed; top: -20%; left: 50%; transform: translateX(-50%); width: 80vw; height: 60vh; background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, rgba(243, 244, 246, 0) 70%); filter: blur(80px); pointer-events: none; z-index: 0; }
.os-container { display: grid; grid-template-columns: 60px 1fr 320px; grid-template-rows: 60px 1fr; height: 100vh; position: relative; z-index: 1; }
.os-header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border-subtle); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
.logo { font-family: var(--font-mono); font-weight: 700; font-size: 18px; letter-spacing: -0.05em; color: var(--text-primary); display: flex; align-items: center; gap: 12px; text-transform: uppercase; }
.logo span { color: var(--accent-primary); }
.agent-command { flex: 1; max-width: 600px; margin: 0 40px; position: relative; }
.agent-input { width: 100%; background: var(--bg-deep); border: 1px solid var(--border-subtle); color: var(--text-primary); padding: 10px 16px 10px 40px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; transition: all 0.2s var(--ease-out); }
.agent-input::placeholder { color: var(--text-tertiary); }
.agent-input:focus { outline: none; background: var(--bg-surface); border-color: var(--accent-primary); box-shadow: 0 0 0 1px var(--accent-primary), 0 0 20px var(--accent-glow); }
.agent-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; background: var(--accent-primary); border-radius: 50%; box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); animation: pulse 2s infinite; }
.os-nav { grid-column: 1 / 2; grid-row: 2 / 3; border-right: 1px solid var(--border-subtle); background: var(--bg-sidebar); display: flex; flex-direction: column; align-items: center; padding-top: 24px; gap: 16px; }
.nav-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); border-radius: 8px; cursor: pointer; transition: all 0.2s; position: relative; }
.nav-item:hover { color: var(--text-primary); background: var(--bg-deep); }
.nav-item.active { color: var(--accent-primary); background: var(--accent-dim); }
.nav-item svg { width: 20px; height: 20px; stroke-width: 1.8; }
.tooltip { position: absolute; left: 50px; background: var(--text-primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; z-index: 10; }
.nav-item:hover .tooltip { opacity: 1; }
.workspace { grid-column: 2 / 3; grid-row: 2 / 3; padding: 24px; overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto 1fr; gap: 20px; }
.card { background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 20px; border-radius: 8px; display: flex; flex-direction: column; position: relative; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.02); }
.card:hover { border-color: var(--border-active); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.card-title { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); font-weight: 600; }
.card-action { color: var(--text-tertiary); cursor: pointer; transition: color 0.2s; }
.card-action:hover { color: var(--text-primary); }
.metric-value { font-size: 28px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.03em; margin-bottom: 4px; }
.metric-delta { font-size: 12px; font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; font-weight: 500; }
.delta-up { color: var(--accent-primary); }
.delta-neutral { color: var(--text-secondary); }
.delta-down { color: #EF4444; }
.metric-card { grid-column: span 1; }
.chart-card { grid-column: span 2; min-height: 280px; }
.table-card { grid-column: span 2; grid-row: span 2; }
.utilization-card { grid-column: span 1; grid-row: span 2; }
.chart-placeholder { flex: 1; display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; padding-top: 20px; }
.bar { background: #E5E7EB; width: 100%; border-radius: 2px 2px 0 0; position: relative; transition: height 0.5s var(--ease-out); }
.bar.highlight { background: var(--accent-bright); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: var(--text-secondary); padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle); font-weight: 600; }
.data-table td { padding: 12px 0; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr td:first-child { color: var(--text-primary); font-weight: 500; }
.data-table tr:hover td { color: var(--text-primary); }
.status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 100px; background: var(--bg-deep); font-size: 11px; color: var(--text-secondary); font-weight: 500; border: 1px solid transparent; }
.status-badge.active { background: var(--accent-dim); color: var(--accent-primary); border-color: rgba(37, 99, 235, 0.2); }
.status-badge.delayed { background: #FEF2F2; color: #EF4444; border-color: #FECACA; }
.agent-sidebar { grid-column: 3 / 4; grid-row: 2 / 3; border-left: 1px solid var(--border-subtle); background: var(--bg-sidebar); display: flex; flex-direction: column; }
.agent-header { padding: 20px; border-bottom: 1px solid var(--border-subtle); font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; font-weight: 600; }
.live-dot { width: 8px; height: 8px; background: var(--accent-primary); border-radius: 50%; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2); animation: pulse-dot 2s infinite; }
.agent-feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; }
.feed-item { display: flex; flex-direction: column; gap: 8px; }
.feed-meta { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); font-weight: 500; }
.feed-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.highlight-text { color: var(--text-primary); font-weight: 500; }
.alert-box { background: var(--accent-dim); border: 1px solid rgba(37, 99, 235, 0.2); padding: 16px; border-radius: 6px; margin-top: 8px; }
.alert-title { color: var(--accent-primary); font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.btn-action { margin-top: 12px; background: var(--accent-primary); color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s; box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2); }
.btn-action:hover { opacity: 0.9; }
.heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
.heat-cell { aspect-ratio: 1; background: #F3F4F6; border-radius: 2px; }
.heat-low { background: #DBEAFF; }
.heat-med { background: #93C5FD; }
.heat-high { background: #3B82F6; }
.heat-max { background: #1D4ED8; }
.mono { font-family: var(--font-mono); }
.text-right { text-align: right; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
@keyframes pulse-dot { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
</style>
</head>
